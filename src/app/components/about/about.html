<div class="flex flex-col px-5 sm:px-20 xl:px-52 bg-transparent py-20">
  <div class="text-center md:text-left animate-fade-in-up">
    <h1 class="text-4xl font-bold mb-4">Build Digital Experiences</h1>
    <p class="text-gray-400 text-lg max-w-2xl">
      I specialize in creating stunning user interfaces and developing high-quality applications
      that stand out.
    </p>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 gap-12 pt-12">
    @for (item of cardDetails; track item.id) {
    <div
      class="flex flex-col border border-white/10 bg-white/5 rounded-xl p-8 backdrop-blur-3xl animate-fade-in-up-delay-1 hover:-translate-y-2 transition-all duration-300 hover:bg-white/10 hover:shadow-[0_8px_30px_rgb(0,0,0,0.5)] hover:border-(--primary-color)/30"
    >
      <div class="flex pb-4 items-start">
        <img class="size-8 mr-4 brightness-0 invert opacity-90" [src]="item.icon" alt="" />
        <h1 class="text-2xl font-bold text-center">{{ item.title }}</h1>
      </div>
      <div>
        <p class="text-gray-600 dark:text-gray-400 pb-4">
          {{ item.description }}
        </p>
        <ul class="list-disc space-y-2 pl-6">
          @for (item of item.list; track $index) {
          <li>{{ item }}</li>
          }
        </ul>
      </div>
    </div>
    }
  </div>
</div>
