<div
  class="fixed inset-0 z-50 transition-all duration-300"
  role="dialog"
  area-modal="true"
  aria-labelledby="modalTitle"
  [class.opacity-100]="isOpen"
  [class.opacity-0]="!isOpen"
  [class.pointer-events-auto]="isOpen"
  [class.pointer-events-none]="!isOpen"
>
  <!-- Backdrop -->
  <div
    class="fixed inset-0 w-full h-full bg-black/50 backdrop-blur-sm"
    (click)="closeDialog()"
  ></div>

  <!-- Slide-in panel from top -->
  <div
    class="relative w-full bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-white/10 shadow-2xl transition-all duration-300"
    [class.translate-y-0]="isOpen"
    [class.-translate-y-full]="!isOpen"
    aria-modal="true"
    role="dialog"
    tabindex="-1"
  >
    <div class="px-6 py-8">
      <!-- Close button -->
      <button
        class="absolute top-4 right-4 p-2 rounded-full text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/10 transition-all"
        (click)="closeDialog()"
      >
        <span class="sr-only">Close</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Nav links -->
      <nav class="flex flex-col space-y-2 mt-4">
        @if (portfolioData(); as data) {
          @for (item of data.navItems; track $index) {
            <a
              [routerLink]="item.route"
              routerLinkActive="!text-white dark:!text-black !bg-(--primary-color)"
              [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
              (click)="closeDialog()"
              class="w-full text-left px-5 py-3 rounded-xl text-base font-semibold text-gray-700 dark:text-gray-200 hover:text-(--primary-color) hover:bg-(--primary-color)/10 transition-all duration-200"
              >{{ item.label }}</a
            >
          }
          <!-- Resume Button (Mobile) -->
          @if (data.profile.resumeUrl; as resumeUrl) {
            <a
              [href]="resumeUrl"
              download
              target="_blank"
              class="mt-2 w-full inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl text-base font-bold border-2 border-(--primary-color) text-(--primary-color) hover:bg-(--primary-color) hover:text-white dark:hover:text-black transition-all duration-200"
              (click)="closeDialog()"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
              </svg>
              Resume
            </a>
          }
        }
      </nav>
    </div>
  </div>
</div>
