<div
  class="fixed inset-0 z-10 overflow-y-auto transition-opacity duration-500 ease-in"
  role="dialog"
  area-modal="true"
  aria-labelledby="modalTitle"
  [class.opacity-100]="isOpen"
  [class.opacity-0]="!isOpen"
  [class.pointer-events-auto]="isOpen"
  [class.pointer-events-none]="!isOpen"
>
  <div
    class="fixed inset-0 w-full h-full bg-(--secondary-color) opacity-50"
    (click)="closeDialog()"
  ></div>
  <div
    class="flex items-start min-h-screen transform transition-transform duration-500 ease-in-out"
    aria-modal="true"
    role="dialog"
    tabindex="-1"
  >
    <div
      class="relative w-full max-w-lg p-4 mx-auto rounded-md shadow-lg text-center bg-(--background-color)"
    >
      <button
        class="absolute top-2 right-2 text-(--primary-color) hover:text-(--btn-hover-color)"
        (click)="closeDialog()"
      >
        <span class="sr-only">Close</span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <nav class="flex flex-col space-y-4 mt-8">
        @for (item of navItems; track $index) {
          <a
            [routerLink]="item.route"
            class="text-lg font-medium text-(--primary-color)"
            routerLinkActive="text-(--secondary-color) font-semibold border rounded bg-(--primary-color) px-4 py-2"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
            (click)="closeDialog()"
            >{{ item.label }}</a
          >
        }
      </nav>
    </div>
  </div>
</div>
