<div class="md:px-20 -z-50 relative bg-(--background-color)">
  <nav aria-label="Global" class="flex items-center justify-between p-6 md:px-3 lg:px-8">
    <div class="flex md:flex-1">
      <a href="/" class="-m-1.5 p-1.5 flex item-center justify-between gap-3">
        <div class="flex items-center">
          <h2 class="text-(--primary-color) text-xl font-bold">{{ portfolio.NAME }}</h2>
        </div>
      </a>
    </div>
    <div class="flex lg:hidden md:hidden">
      <button
        type="button"
        class="-m-2.5 inline-flex items-center justify-center rounded-md p-2.5 text-(--secondary-color) hover:bg-(--btn-hover-color) focus:outline-none focus:ring-2 focus:ring-inset focus:ring-(--primary-color)"
        (click)="openDialog()"
      >
        <span class="sr-only">Open main menu</span>
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          data-slot="icon"
          aria-hidden="true"
          class="size-6"
        >
          <path
            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
    <div class="hidden md:flex lg:flex gap-x-6 lg:gap-x-12">
      @for (item of navItems; track $index) {
        <a
          [routerLink]="item.route"
          routerLinkActive="font-semibold border-b-1 bg-(--primary-color) text-(--background-color)"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          class="relative z-10 inline-flex items-center justify-center w-full px-8 py-3 font-bold text-(--secondary-color) transition-all duration-200 bg-(--primary-color) border-2 border-transparent sm:w-auto rounded-xl font-pj hover:bg-(--btn-hover-color) hover:text-(--background-color) focus:outline-none text-sm/2"
        >
          {{ item.label }}
        </a>
      }
    </div>
  </nav>
  <app-dialog-box [isOpen]="isModalOpen" (closeModal)="closeDialogModal()"></app-dialog-box>
</div>
