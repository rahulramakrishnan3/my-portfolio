@if (pwaInstall.canInstall()) {
  <div
    role="dialog"
    aria-label="Install app"
    class="fixed bottom-20 left-1/2 -translate-x-1/2 z-[200] w-[calc(100%-2rem)] max-w-sm
           animate-fade-in-up"
  >
    <div class="flex items-center gap-4 p-4 rounded-2xl
                bg-gray-900/95 dark:bg-gray-950/95 backdrop-blur-xl
                border border-white/10 shadow-2xl">

      <!-- App icon -->
      <img
        src="images/r-icon.png"
        alt="App icon"
        width="44"
        height="44"
        class="rounded-xl shrink-0"
      />

      <!-- Text -->
      <div class="flex-1 min-w-0">
        <p class="text-sm font-bold text-white truncate">Rahul KR — Portfolio</p>
        <p class="text-xs text-gray-400 mt-0.5">Add to Home Screen for quick access</p>
      </div>

      <!-- Install button -->
      <button
        (click)="pwaInstall.install()"
        class="shrink-0 px-4 py-2 rounded-xl text-xs font-bold
               bg-(--primary-color) text-black
               hover:opacity-90 hover:scale-105
               active:scale-95 transition-all duration-150"
      >
        Install
      </button>

      <!-- Dismiss -->
      <button
        (click)="pwaInstall.dismiss()"
        aria-label="Dismiss install prompt"
        class="shrink-0 p-1.5 rounded-lg text-gray-500
               hover:text-white hover:bg-white/10
               transition-all duration-150"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>
}
