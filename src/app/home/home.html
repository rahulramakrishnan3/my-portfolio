@if (portfolioData(); as data) {
<div
  class="min-h-full flex items-center justify-center p-6 flex-col gap-10 md:flex-col sm:flex-col lg:flex-col lg:gap-40 xl:flex-row mx-auto py-20"
>
  <div class="rounded-full h-60 w-60 md:h-72 md:w-72 lg:h-120 lg:w-120 overflow-hidden shrink-0">
    <img src="images/profile-image-2.jpg" alt="User image" class="h-full w-full rounded-full" />
  </div>
  <div class="grid grid-cols-1">
    <div class="image-div flex flex-col md:flex-row md:items-center gap-10 pb-8 animate-fade-in-up">
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-medium tracking-tight">
        Hi, I'm <span>{{ data.profile.name }}</span>
        <br />
        An <span class="text-(--primary-color) font-semibold">{{ data.profile.role }}</span>
      </h1>
    </div>
    <p class="text-lg mt-4 mb-6 max-w-[750px] animate-fade-in-up-delay-1">
      A Software Developer with solid foundation in
      <span class="text-(--primary-color) font-semibold">Angular</span>. <br />Passionate about
      crafting seamless user experience.
    </p>
    <div
      class="flex flex-col gap-4 lg:gap-0 lg:flex-row lg:items-center justify-between max-w-[600px] mt-8 animate-fade-in-up-delay-2"
    >
      <div class="flex gap-4">
        <a href="RESUME_FD_KL.pdf"
          ><button
            type="button"
            class="cursor-pointer text-(--primary-color) border border-(--primary-color) shadow-[0_0_15px_rgba(0,255,255,0.15)] hover:shadow-[0_0_20px_rgba(0,255,255,0.4)] hover:bg-(--primary-color) hover:text-black transition-all duration-300 font-medium leading-5 rounded-full text-sm px-6 py-3 focus:outline-none flex items-center gap-2 hover:-translate-y-1"
          >
            <span class="hover:text-(--background-color)">&#10515;</span>
            Download CV
          </button></a
        >
        <a href="mailto:rahulramakrishnan512@gmail.com"
          ><button
            type="button"
            class="cursor-pointer text-(--primary-color) border border-(--primary-color) shadow-[0_0_15px_rgba(0,255,255,0.15)] hover:shadow-[0_0_20px_rgba(0,255,255,0.4)] hover:bg-(--primary-color) hover:text-black transition-all duration-300 font-medium leading-5 rounded-full text-sm px-6 py-3 focus:outline-none hover:-translate-y-1"
          >
            @ Contact Me
          </button></a
        >
      </div>
      <div class="flex gap-4 animate-fade-in-up-delay-3">
        <a
          [href]="data.socialLinks.github"
          target="_blank"
          class="h-8 w-8 inline-block mr-4 hover:-translate-y-1 transition-transform duration-300 hover:scale-110"
        >
          <img src="icons/github.svg" alt="GitHub" class="brightness-0 invert opacity-80 hover:opacity-100 transition-opacity" />
        </a>
        <a
          [href]="data.socialLinks.instagram"
          target="_blank"
          class="h-8 w-8 inline-block mr-4 hover:-translate-y-1 transition-transform duration-300 hover:scale-110"
        >
          <img src="icons/instagram.svg" alt="Instagram" class="brightness-0 invert opacity-80 hover:opacity-100 transition-opacity" />
        </a>
        <a
          [href]="data.socialLinks.linkedin"
          target="_blank"
          class="h-8 w-8 inline-block mr-4 hover:-translate-y-1 transition-transform duration-300 hover:scale-110"
        >
          <img src="icons/linkedin.svg" alt="LinkedIn" class="brightness-0 invert opacity-80 hover:opacity-100 transition-opacity" />
        </a>
      </div>
    </div>
    <!-- <div class="relative mt-5 inline-block"> ... </div> -->
  </div>
</div>
} @else {
  <div class="min-h-full flex items-center justify-center p-6 py-20">
    <div class="animate-pulse w-32 h-32 rounded-full bg-gray-800"></div>
  </div>
}
